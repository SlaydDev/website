<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>All the Memories</title>
<style>
/* === Use your site CSS === */
*,
*::before,
*::after { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
html { scroll-behavior: smooth; }
body {
  background: #000;
  color: #fff;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  line-height: 1.5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  padding: 40px;
}

h1 {
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 40px;
  font-size: 3.5rem;
  color: #9c3cff; /* subtle purple accent */
  text-align: center;
}

/* gallery layout */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 20px;
  max-width: 1200px;
  margin: 0 auto;
}

.card {
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  border: 1px solid #2a1a3d;
  background: #111;
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.card:hover {
  transform: scale(1.03);
  box-shadow: 0 8px 20px rgba(156, 60, 255, 0.3);
}

.card img {
  width: 100%;
  display: block;
}

/* watermark */
.watermark {
  position: absolute;
  bottom: 6px;
  right: 8px;
  color: rgba(255,255,255,0.5);
  font-size: 12px;
  font-weight: bold;
  pointer-events: none;
}

/* title under each image */
.title {
  padding: 8px;
  text-align: center;
  color: #bbb;
  font-size: 14px;
}
</style>
</head>
<body>

<h1>All the Memories</h1>

<div class="gallery">

  <div class="card">
    <img src="classic-fd-truck(with fire).png" alt="Classic FD Truck (with fire)">
    <div class="watermark">CaptainEXE</div>
    <div class="title">Classic FD Truck (with fire)</div>
  </div>

  <div class="card">
    <img src="classic-fd-truck.png" alt="Classic FD Truck">
    <div class="watermark">CaptainEXE</div>
    <div class="title">Classic FD Truck</div>
  </div>

  <div class="card">
    <img src="fd-ladder-truck(bucket).png" alt="FD Ladder Truck (bucket)">
    <div class="watermark">CaptainEXE</div>
    <div class="title">FD Ladder Truck (bucket)</div>
  </div>

  <div class="card">
    <img src="unmarked-tahoe-winter.png" alt="Unmarked Tahoe Winter">
    <div class="watermark">CaptainEXE</div>
    <div class="title">Unmarked Tahoe Winter</div>
  </div>

</div>

</body>
</html>

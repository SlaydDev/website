<!DOCTYPE html>
<html>
<head>
<title>SlaydDev Captures</title>

<style>

body{
background:linear-gradient(180deg,#0b0b0b,#0b0b0b,#140b1f);
color:white;
font-family:sans-serif;
margin:0;
padding:40px;
}

h1{
font-size:40px;
letter-spacing:1px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:18px;
margin-top:30px;
}

.card{
background:#111;
border-radius:8px;
overflow:hidden;
border:1px solid #2a1a3d;
}

.card img, .card video{
width:100%;
display:block;
}

.title{
padding:10px;
font-size:14px;
color:#bbb;
}

#gate{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(180deg,#0b0b0b,#140b1f);
}

.box{
background:#111;
padding:30px;
border-radius:10px;
border:1px solid #2a1a3d;
text-align:center;
}

input{
background:#0b0b0b;
border:1px solid #333;
padding:10px;
color:white;
margin-top:10px;
}

button{
background:#6c3cff;
border:none;
padding:10px 18px;
color:white;
margin-top:10px;
cursor:pointer;
}

</style>

<script>

const PASSWORD = "CaptainSOS";

function unlock(){
let p=document.getElementById("pass").value;

if(p===PASSWORD){
document.getElementById("gate").style.display="none";
loadCaptures();
}else{
alert("wrong password");
}
}

async function loadCaptures(){

let res=await fetch("/captures.json");
let data=await res.json();

let gallery=document.getElementById("gallery");

data.files.forEach(file=>{

let card=document.createElement("div");
card.className="card";

let media;

if(file.type==="image"){
media=document.createElement("img");
}else{
media=document.createElement("video");
media.controls=true;
}

media.src="/captures/"+file.file;

let title=document.createElement("div");
title.className="title";
title.textContent=file.name;

card.appendChild(media);
card.appendChild(title);

gallery.appendChild(card);

});

}

</script>

</head>

<body>

<div id="gate">
<div class="box">
<h2>Private Capture Archive</h2>
<input id="pass" type="password" placeholder="Password">
<br>
<button onclick="unlock()">Enter</button>
</div>
</div>

<h1>Captures</h1>

<div id="gallery" class="gallery"></div>

</body>
</html>
